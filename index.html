	<!-- ════════════════════════════════════════
       HERO
  ════════════════════════════════════════ -->
	<section class="hero">
		<p class="hero-eyebrow">Lagos, Nigeria</p>
		<h1 class="hero-name">John <em>Wisdom</em> Eze</h1>
		<p class="hero-subtitle">Visionary Leader</p>
		<div class="hero-rule"></div>
	</section>

	<!-- ════════════════════════════════════════
       CARD CAROUSEL
  ════════════════════════════════════════ -->
	<section class="carousel-section">
		<div class="position-relative" style="max-width:1000px; margin:0 auto;">

			<!-- Cards Stage -->
			<div class="cards-stage" id="cardsStage">

				<!-- CARD 0 — Artist / Talent Mgmt.-->
				<div class="persona-card" data-index="0" data-pos="prev">
					<div class="card-image">
						<img src="img/artist.jpg" class="card-image" alt="Artist / Talent Management">
					</div>
					<div class="card-body-content">
						<div class="card-tag">Uncle Wisdom</div>
						<div class="card-title-text">Artist/Talent Mgmt.</div>
						<div class="card-desc-text">Breeding Next-gen Stars</div>
					</div>
				</div>

				<!-- CARD 1 — Music Executive (active) -->
				<div class="persona-card" data-index="1" data-pos="active">
					<div class="card-image">
						<img src="img/exec.jpg" class="card-image" alt="Music Executive">
					</div>
					<div class="card-body-content">
						<div class="card-tag">Uncle Wisdom</div>
						<div class="card-title-text">Music Executive</div>
						<div class="card-desc-text">Shaping sound, scaling success</div>
					</div>
				</div>

				<!-- CARD 2 — Career Coach -->
				<div class="persona-card" data-index="2" data-pos="next">
					<div class="card-image">
						<img src="img/career.jpg" class="card-image" alt="Career Coach / A&R">
					</div>
					<div class="card-body-content">
						<div class="card-tag">Uncle Wisdom</div>
						<div class="card-title-text">Career Coach / A&R</div>
						<div class="card-desc-text">Where guidance meets greatness</div>
					</div>
				</div>

			</div><!-- /cards-stage -->

			<!-- Previous Button -->
			<button class="carousel-btn btn-prev" id="btnPrev" aria-label="Previous">&#8592;</button>
			<!-- Next Button -->
			<button class="carousel-btn btn-next" id="btnNext" aria-label="Next">&#8594;</button>

		</div><!-- /position-relative -->

		<!-- Dot indicators -->
		<div class="carousel-dots" id="dotsContainer">
			<div class="dot active" data-target="0"></div>
			<div class="dot" data-target="1"></div>
			<div class="dot" data-target="2"></div>
		</div>

	</section>
